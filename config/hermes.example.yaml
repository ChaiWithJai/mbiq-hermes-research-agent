model:
  provider: custom
  base_url: http://127.0.0.1:8080/v1
  # MLX's reserved name uses the model already loaded by start-bonsai.sh.
  default: default_model
  # This is the local working limit, not the model's theoretical limit.
  context_length: 32768
  # Reserve output room inside the same context window.
  max_tokens: 2048

compression:
  enabled: true
  threshold: 0.75
  target_ratio: 0.20
  protect_last_n: 4

# Keep compaction on the pinned local model. Do not let an automatic
# auxiliary route probe remote providers during a memory-safety boundary.
auxiliary:
  compression:
    provider: main

mcp_servers:
  exa:
    url: https://mcp.exa.ai/mcp?tools=web_search_exa,web_search_advanced_exa,web_fetch_exa
    supports_parallel_tool_calls: false
    tools:
      include:
        - web_search_exa
        - web_search_advanced_exa
        - web_fetch_exa
      prompts: false
      resources: false

approvals:
  mode: ask
  cron_mode: deny

display:
  tool_progress: verbose
  show_reasoning: true
  reasoning_full: true
  persist_prompts: true
